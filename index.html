// ── AUTH ──────────────────────────────────────────────────────
async function signIn(email, password) {
  const res = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, {
    method:"POST",
    headers:{"Content-Type":"application/json","apikey":SUPA_KEY},
    body: JSON.stringify({email,password})
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description||data.msg||"Credenciales incorrectas");
  return data;
}
async function signOut(token) {
  await fetch(`${SUPA_URL}/auth/v1/logout`, {
    method:"POST",
    headers:{"Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":`Bearer ${token}`}
  });
}
async function getSession() {
  try {
    const raw = localStorage.getItem("mpt_session");
    if (!raw) return null;
    const session = JSON.parse(raw);
    // verify token still valid
    const res = await fetch(`${SUPA_URL}/auth/v1/user`, {
      headers:{"apikey":SUPA_KEY,"Authorization":`Bearer ${session.access_token}`}
    });
    if (!res.ok) { localStorage.removeItem("mpt_session"); return null; }
    return session;
  } catch { return null; }
}

// ── DB ────────────────────────────────────────────────────────
async function sb(path, opts={}, token=null) {
  const authH = token ? {...H,"Authorization":`Bearer ${token}`} : H;
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, { headers:{...authH,...(opts.headers||{})}, ...opts });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  const txt = await res.text();
  return txt ? JSON.parse(txt) : [];
}
const GET    = (t, q="")        => sb(q ? `${t}?${q}` : `${t}`);
const POST   = (t, body)        => sb(t, { method:"POST",  body: JSON.stringify(body) });
const PATCH  = (t, q, body)     => sb(`${t}?${q}`, { method:"PATCH", body: JSON.stringify(body) });
const DELETE = (t, q)           => sb(`${t}?${q}`, { method:"DELETE" });
const UPSERT = (t, body, on)    => sb(`${t}?on_conflict=${on}`, { method:"POST", headers:{...H,"Prefer":"resolution=merge-duplicates,return=representation"}, body: JSON.stringify(body) });

// Promedio ponderado por tipo
function avgPonderado(actividades) {
  if(!actividades||actividades.length===0) return null;
  let totalPeso=0, totalNota=0;
  Object.entries(ACT_TIPOS).forEach(([tipo,{peso}])=>{
    const acts=actividades.filter(a=>a.tipo===tipo&&a.nota!=null);
    if(acts.length>0){
      const prom=acts.reduce((s,a)=>s+parseFloat(a.nota),0)/acts.length;
      totalNota+=prom*peso; totalPeso+=peso;
    }
  });
  return totalPeso>0?totalNota/totalPeso:null;
}

// Semana ISO
function semanaLabel(fecha){
  const d=new Date(fecha+"T00:00:00");
  const lunes=new Date(d); lunes.setDate(d.getDate()-((d.getDay()+6)%7));
  const viernes=new Date(lunes); viernes.setDate(lunes.getDate()+4);
  const fmt2=x=>x.toLocaleDateString("es-CO",{day:"2-digit",month:"short"});
  return `${fmt2(lunes)} – ${fmt2(viernes)}`;
}

        const [n,act,o,om,c,m,inst] = await Promise.all([
          sb(`notas?estudiante_id=eq.${st.id}`),
          sb(`actividades?estudiante_id=eq.${st.id}&order=fecha.desc`),
          sb(`observaciones?estudiante_id=eq.${st.id}`),
          sb(`observaciones_materia?estudiante_id=eq.${st.id}`),
          sb(`comunicaciones?or=(estudiante_id.eq.${st.id},and(tipo.eq.grupal,grado.eq.${st.grado}))`),
          sb(`materias?activa=eq.true&order=orden.asc`),
          sb(`institucion?limit=1`),
        ]);
        setNotas(n); setActivs(act); setObs(o); setObsMats(om); setComs(c); setMaterias(m);
        if(inst[0]?.logo_url) setLogoUrl(inst[0].logo_url);
      } catch(e){ setError("Error cargando datos: "+e.message); }
      finally { setLoading(false); }
    }
    load();
  },[token]);

  if(loading) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0d3320,#1B4332)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{textAlign:"center",color:"#fff"}}>
        <div style={{fontSize:44,marginBottom:14}}>🏫</div>
        <div style={{fontFamily:"Georgia,serif",fontSize:17,marginBottom:16}}>Mis Pequeños Tesoros</div>
        <div style={{width:34,height:34,border:"3px solid rgba(255,255,255,0.3)",borderTop:"3px solid #52B788",borderRadius:"50%",animation:"spin .7s linear infinite",margin:"0 auto"}}/>
        <div style={{marginTop:14,fontSize:12,opacity:.6}}>Cargando información...</div>
      </div>
    </div>
  );

  if(error) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0d3320,#1B4332)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"rgba(255,255,255,0.1)",borderRadius:16,padding:"32px 28px",textAlign:"center",color:"#fff",maxWidth:360}}>
        <div style={{fontSize:48,marginBottom:16}}>⚠️</div>
        <div style={{fontFamily:"Georgia,serif",fontSize:18,marginBottom:10}}>Link no válido</div>
        <div style={{fontSize:13,opacity:.7,lineHeight:1.5}}>{error}</div>
        <div style={{marginTop:20,fontSize:12,opacity:.5}}>Contacta al colegio para obtener un nuevo link.</div>
      </div>
    </div>
  );

  // Build notasMap[periodo][materia_id]
  const notasMap = {};
  notas.forEach(n=>{
    if(!notasMap[n.periodo]) notasMap[n.periodo]={};
    notasMap[n.periodo][n.materia_id]=parseFloat(n.nota);
  });
  const obsMap = {};
  obs.forEach(o=>{ obsMap[o.periodo]=o; });
  const obsMatsMap = {};
  obsMats.forEach(o=>{
    if(!obsMatsMap[o.periodo]) obsMatsMap[o.periodo]={};
    obsMatsMap[o.periodo][o.materia_id]=o.texto;
  });

  const mats      = materias.filter(m=>m.activa);
  const pNotes    = notasMap[period+1]||{};
  const prom      = avg(mats.map(m=>pNotes[m.id]));
  const unreadC   = coms.filter(c=>!c.leido).length;

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0a2918 0%,#1B4332 40%,#2d6a4f 100%)",fontFamily:"sans-serif"}}>
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}} @keyframes spin{to{transform:rotate(360deg)}}`}</style>

      {/* HEADER */}
      <div style={{background:"rgba(0,0,0,0.3)",backdropFilter:"blur(10px)",padding:"16px 22px",display:"flex",alignItems:"center",gap:14,borderBottom:"1px solid rgba(255,255,255,0.1)",position:"sticky",top:0,zIndex:50}}>
        {logoUrl
          ? <img src={logoUrl} alt="Escudo" style={{width:44,height:44,borderRadius:"50%",objectFit:"cover",border:"2px solid rgba(255,255,255,0.4)",flexShrink:0}}/>

        }
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700}}>Mis Pequeños Tesoros</div>
          <div style={{color:"rgba(255,255,255,0.55)",fontSize:11,marginTop:1}}>Portal de Padres de Familia</div>
        </div>
        <div style={{background:"rgba(82,183,136,0.2)",border:"1px solid rgba(82,183,136,0.4)",borderRadius:20,padding:"4px 12px",fontSize:11,color:"#52B788",flexShrink:0}}>🔒 Acceso privado</div>
      </div>

      {/* WELCOME CARD */}
      <div style={{padding:"22px 20px 0",maxWidth:720,margin:"0 auto",animation:"fadeIn .4s"}}>
        <div style={{background:"rgba(255,255,255,0.08)",backdropFilter:"blur(8px)",borderRadius:16,padding:"20px 22px",marginBottom:18,border:"1px solid rgba(255,255,255,0.12)",display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,#52B788,#1B4332)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold",fontSize:18,flexShrink:0}}>
            {mkAv(student.nombre)}
          </div>
          <div style={{flex:1}}>
            <div style={{color:"rgba(255,255,255,0.6)",fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Información académica de</div>
            <div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:19,fontWeight:700}}>{student.nombre}</div>
            <div style={{color:"rgba(255,255,255,0.55)",fontSize:12,marginTop:2}}>Grado {student.grado} · Acudiente: {student.parent_nombre||"—"}</div>
          </div>
          <div style={{textAlign:"center",flexShrink:0}}>
            <div style={{fontFamily:"Georgia,serif",fontSize:28,fontWeight:700,color:nClr(prom)}}>{fmt(prom)}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.45)"}}>Promedio {PERIODOS[period]}</div>
          </div>
        </div>

        {/* PERIOD SELECTOR */}
        <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
          {PERIODOS.map((p,i)=>(
            <button key={i} onClick={()=>{setPeriod(i);setSelectedMat(null);}}
              style={{padding:"7px 14px",border:`1px solid ${period===i?"#52B788":"rgba(255,255,255,0.2)"}`,borderRadius:20,background:period===i?"rgba(82,183,136,0.25)":"rgba(255,255,255,0.05)",color:period===i?"#52B788":"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:12,fontWeight:period===i?700:400,whiteSpace:"nowrap",flexShrink:0}}>

        {/* ── TAB NOTAS ── */}
        {tab==="notas"&&(
          <div style={{animation:"fadeIn .3s"}}>

                    <div style={{fontFamily:"Georgia,serif",fontSize:40,fontWeight:700,color:nClr(prom)}}>{fmt(prom)}</div>
                  </div>

                      return (

                          <div style={{fontSize:11,color:"rgba(255,255,255,0.6)",marginBottom:6,fontWeight:500}}>{m.nombre}</div>

                          {matActs.length>0&&<div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginTop:5}}>📋 {matActs.length} actividad(es)</div>}
                          {m.docente&&<div style={{fontSize:9,color:"rgba(255,255,255,0.35)",marginTop:2}}>👩‍🏫 {m.docente}</div>}
                        </div>
                      );

                  </div>

                  {/* DETALLE ACTIVIDADES DE LA MATERIA SELECCIONADA */}
                  {selectedMat&&(()=>{
                    const mat     = mats.find(m=>m.id===selectedMat);
                    const matActs = activs.filter(a=>a.materia_id===selectedMat&&a.periodo===period+1);
                    const matProm = avgPonderado(matActs);

                    // agrupar por semana
                    const porSemana={};
                    [...matActs].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).forEach(a=>{
                      const sem=semanaLabel(a.fecha);
                      if(!porSemana[sem]) porSemana[sem]=[];
                      porSemana[sem].push(a);
                    });

                    return(
                      <div style={{background:"rgba(255,255,255,0.06)",borderRadius:14,marginBottom:16,overflow:"hidden",border:"1px solid rgba(82,183,136,0.3)",animation:"fadeIn .25s"}}>
                        {/* header materia */}
                        <div style={{padding:"14px 18px",background:"rgba(82,183,136,0.15)",display:"flex",alignItems:"center",gap:12,borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
                          <span style={{fontSize:26}}>{mat.icono}</span>
                          <div style={{flex:1}}>
                            <div style={{color:"#fff",fontWeight:700,fontSize:15}}>{mat.nombre}</div>
                            <div style={{color:"rgba(255,255,255,0.5)",fontSize:11}}>
                              {mat.docente?`👩‍🏫 ${mat.docente} · `:""}{matActs.length} actividad(es) · {PERIODOS[period]}
                            </div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontFamily:"Georgia,serif",fontSize:26,fontWeight:700,color:nClr(matProm)}}>{fmt(matProm)}</div>
                            <div style={{fontSize:9,color:"rgba(255,255,255,0.4)"}}>Prom. ponderado</div>
                          </div>
                        </div>

                        {matActs.length===0?(
                          <div style={{padding:"20px 18px",textAlign:"center",color:"rgba(255,255,255,0.35)",fontSize:13}}>
                            Sin actividades registradas en {PERIODOS[period]}
                          </div>
                        ):(
                          <div style={{padding:"14px 18px"}}>
                            {/* resumen tipos */}
                            <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:14}}>
                              {Object.entries(ACT_TIPOS).map(([tipo,{color,bg,icon}])=>{
                                const ta=matActs.filter(a=>a.tipo===tipo);
                                if(!ta.length) return null;
                                const ta_avg=avg(ta.map(a=>parseFloat(a.nota)));
                                return(
                                  <div key={tipo} style={{background:"rgba(255,255,255,0.07)",borderRadius:9,padding:"6px 10px",fontSize:11,display:"flex",alignItems:"center",gap:5,border:"1px solid rgba(255,255,255,0.08)"}}>
                                    <span>{icon}</span>
                                    <span style={{color:"rgba(255,255,255,0.7)"}}>{tipo}</span>
                                    <span style={{color:nClr(ta_avg),fontWeight:700}}>{fmt(ta_avg)}</span>
                                    <span style={{color:"rgba(255,255,255,0.35)"}}>({ta.length})</span>
                                  </div>
                                );
                              })}
                            </div>

                            {/* actividades por semana */}
                            {Object.entries(porSemana).map(([semana,semActs])=>{
                              const semAvg=avg(semActs.map(a=>parseFloat(a.nota)));
                              return(
                                <div key={semana} style={{marginBottom:14}}>
                                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                                    <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:1}}>📅 {semana}</div>
                                    <div style={{height:1,flex:1,background:"rgba(255,255,255,0.07)"}}/>
                                    <div style={{fontFamily:"Georgia,serif",fontSize:13,fontWeight:700,color:nClr(semAvg)}}>{fmt(semAvg)}</div>
                                  </div>
                                  {semActs.map(a=>{
                                    const {color,bg,icon}=ACT_TIPOS[a.tipo]||{color:"#6b7280",bg:"rgba(255,255,255,0.05)",icon:"📌"};
                                    return(
                                      <div key={a.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",borderRadius:10,marginBottom:6,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)"}}>
                                        <span style={{fontSize:16,flexShrink:0,marginTop:1}}>{icon}</span>
                                        <div style={{flex:1,minWidth:0}}>
                                          <div style={{color:"#fff",fontWeight:600,fontSize:13}}>{a.titulo}</div>
                                          <div style={{display:"flex",gap:8,alignItems:"center",marginTop:4,flexWrap:"wrap"}}>
                                            <span style={{background:"rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.6)",borderRadius:9,padding:"1px 8px",fontSize:10,fontWeight:600}}>{a.tipo}</span>
                                            <span style={{color:"rgba(255,255,255,0.35)",fontSize:10}}>📅 {a.fecha}</span>
                                            {a.observacion&&<span style={{color:"rgba(255,255,255,0.45)",fontSize:10,fontStyle:"italic"}}>· {a.observacion}</span>}
                                          </div>
                                        </div>
                                        <div style={{flexShrink:0,textAlign:"right"}}>
                                          <span style={{background:nBg(parseFloat(a.nota)),color:nClr(parseFloat(a.nota)),borderRadius:8,padding:"4px 12px",fontWeight:700,fontSize:16,display:"inline-block"}}>{fmt(parseFloat(a.nota))}</span>
                                          <div style={{fontSize:9,color:nClr(parseFloat(a.nota)),fontWeight:600,marginTop:2}}>{lbl(parseFloat(a.nota))}</div>
                                        </div>
                                      </div>
                                    );
                                  })}
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })()}

                  {/* evolución */}
                  <div style={{background:"rgba(255,255,255,0.06)",borderRadius:12,padding:"16px 18px",border:"1px solid rgba(255,255,255,0.1)"}}>
                    <div style={{color:"rgba(255,255,255,0.7)",fontWeight:700,fontSize:13,marginBottom:12}}>📈 Evolución por Período</div>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:320}}>
                        <thead>
                          <tr>
                            <th style={{padding:"7px 10px",textAlign:"left",color:"rgba(255,255,255,0.5)",fontWeight:600}}>Materia</th>
                            {PERIODOS.map(p=><th key={p} style={{padding:"7px 8px",textAlign:"center",color:"rgba(255,255,255,0.5)",fontWeight:600,whiteSpace:"nowrap"}}>{p}</th>)}
                          </tr>
                        </thead>
                        <tbody>
                          {mats.map(m=>(
                            <tr key={m.id} style={{borderTop:"1px solid rgba(255,255,255,0.06)"}}>
                              <td style={{padding:"8px 10px",color:"rgba(255,255,255,0.8)",fontWeight:500}}>{m.icono} {m.nombre}</td>
                              {[1,2,3,4].map(p=>{
                                const n=(notasMap[p]||{})[m.id];
                                return <td key={p} style={{padding:"8px 6px",textAlign:"center"}}>
                                  <span style={{background:nBg(n),color:nClr(n),borderRadius:6,padding:"2px 8px",fontWeight:700,fontSize:12}}>{fmt(n)}</span>
                                </td>;
                              })}
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )
            }
          </div>
        )}

        {/* ── TAB COMUNICADOS ── */}
        {tab==="comunicados"&&(
          <div style={{animation:"fadeIn .3s"}}>
            {coms.length===0
              ? <div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,0.4)",fontSize:13}}>No hay comunicados aún.</div>
              : coms.map(c=>(
                <div key={c.id} style={{background:"rgba(255,255,255,0.08)",borderRadius:12,padding:"15px 18px",marginBottom:10,border:`1px solid ${c.tipo==="grupal"?"rgba(82,183,136,0.3)":"rgba(212,160,23,0.3)"}`}}>
                  <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                    <div style={{width:36,height:36,borderRadius:9,background:c.tipo==="grupal"?"rgba(82,183,136,0.2)":"rgba(212,160,23,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                      {c.tipo==="grupal"?"👥":"👤"}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap",marginBottom:5}}>
                        <span style={{color:"rgba(255,255,255,0.5)",fontSize:10,textTransform:"uppercase",letterSpacing:1}}>{c.tipo==="grupal"?`Comunicado grado ${c.grado}`:"Comunicado personal"}</span>
                        <span style={{background:"rgba(99,102,241,0.25)",color:"#a5b4fc",fontSize:10,padding:"1px 7px",borderRadius:9,fontWeight:600}}>{c.area}</span>

                      </div>
                      <div style={{color:"#fff",fontSize:13,lineHeight:1.55}}>{c.texto}</div>
                      <div style={{color:"rgba(255,255,255,0.35)",fontSize:11,marginTop:6}}>📅 {c.created_at?.slice(0,10)} · ✍️ {c.autor}</div>
                    </div>
                  </div>
                </div>
              ))
            }
          </div>
        )}

        {/* ── TAB OBSERVACIONES ── */}
        {tab==="observaciones"&&(
          <div style={{animation:"fadeIn .3s"}}>
            {[0,1,2,3].map(pi=>{
              const od  = obsMap[pi+1];
              const mOb = obsMatsMap[pi+1]||{};
              const hasData = od?.general||od?.fortalezas||od?.mejorar||Object.values(mOb).some(v=>v);
              if(!hasData) return null;
              return (
                <div key={pi} style={{background:"rgba(255,255,255,0.07)",borderRadius:14,marginBottom:14,overflow:"hidden",border:"1px solid rgba(255,255,255,0.1)"}}>
                  <div style={{padding:"12px 18px",background:"rgba(0,0,0,0.2)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{color:"#fff",fontWeight:700,fontSize:13}}>{PERIODOS[pi]}</span>
                  </div>
                  <div style={{padding:"16px 18px"}}>
                    {od?.general&&(
                      <div style={{marginBottom:12}}>
                        <div style={{fontSize:10,fontWeight:700,color:"#93c5fd",textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>💬 Observación General</div>
                        <p style={{fontSize:13,color:"rgba(255,255,255,0.85)",fontStyle:"italic",lineHeight:1.55,margin:0}}>"{od.general}"</p>
                      </div>
                    )}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:od&&Object.values(mOb).some(v=>v)?12:0}}>
                      {od?.fortalezas&&<div style={{background:"rgba(16,185,129,0.1)",borderRadius:9,padding:"10px 12px",border:"1px solid rgba(16,185,129,0.2)"}}>
                        <div style={{fontSize:9,fontWeight:700,color:"#6ee7b7",textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>⭐ Fortalezas</div>
                        <p style={{fontSize:12,color:"#a7f3d0",margin:0,lineHeight:1.4}}>{od.fortalezas}</p>
                      </div>}
                      {od?.mejorar&&<div style={{background:"rgba(245,158,11,0.1)",borderRadius:9,padding:"10px 12px",border:"1px solid rgba(245,158,11,0.2)"}}>
                        <div style={{fontSize:9,fontWeight:700,color:"#fcd34d",textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>📈 A mejorar</div>
                        <p style={{fontSize:12,color:"#fde68a",margin:0,lineHeight:1.4}}>{od.mejorar}</p>
                      </div>}
                    </div>
                    {Object.entries(mOb).filter(([,v])=>v).length>0&&(
                      <div>
                        <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Por materia</div>

                          const mat=mats.find(m=>m.id===mid);
                          if(!mat) return null;
                          return <div key={mid} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>

// ============================================================
// MAIN APP — auth gate + parent token detection
// ============================================================
function App() {
  const [session,      setSession]      = useState(undefined);
  const [checkingAuth, setCheckingAuth] = useState(true);
  const [parentToken,  setParentToken]  = useState(null);

  useEffect(()=>{
    // Check URL for parent token: ?token=xxx or /padre/xxx
    const params = new URLSearchParams(window.location.search);
    const urlToken = params.get("token") || params.get("padre");
    // Also check hash: #token=xxx
    const hashParams = new URLSearchParams(window.location.hash.replace("#",""));
    const hashToken = hashParams.get("token");
    const token = urlToken || hashToken;
    if(token) { setParentToken(token); setCheckingAuth(false); return; }
    getSession().then(s=>{ setSession(s); setCheckingAuth(false); });
  },[]);

  async function handleLogin(s) { setSession(s); }
  async function handleLogout() {
    if(session?.access_token) await signOut(session.access_token).catch(()=>{});
    localStorage.removeItem("mpt_session");
    setSession(null);
  }

  if(checkingAuth) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0d3320,#1B4332)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{textAlign:"center",color:"#fff"}}>
        <div style={{fontSize:48,marginBottom:16}}>🏫</div>
        <div style={{fontFamily:"Georgia,serif",fontSize:18,marginBottom:16}}>Mis Pequeños Tesoros</div>
        <div style={{width:36,height:36,border:"3px solid rgba(255,255,255,0.3)",borderTop:"3px solid #fff",borderRadius:"50%",animation:"spin .7s linear infinite",margin:"0 auto"}}/>
      </div>
    </div>
  );

  // Parent portal via token
  if(parentToken) return <ParentPortalPublic token={parentToken}/>;

  // Not logged in → show login
  if(!session) return <LoginScreen onLogin={handleLogin}/>;
  return <Dashboard onLogout={handleLogout}/>;
}

      if (!uploadRes.ok) throw new Error("Error subiendo imagen");

      // 2. Get public URL
      const publicUrl = `${SUPA_URL}/storage/v1/object/public/Institucional/${fileName}`;

  // ── OBSERVACIONES ─────────────────────────────────────────
  function openObs(student) {
    const existing = obsMap[student.id]?.[pk]||{};
    const matExist = obsMateriaMap[student.id]?.[pk]||{};
    setObsEdit({ general:existing.general||"", fortalezas:existing.fortalezas||"", mejorar:existing.mejorar||"", materias:{...matExist} });
    setSelSt(student); setMObs(true);
  }
  async function saveObs() {
    setSaving(true);
    try {
      // general obs
      await UPSERT("observaciones",[{estudiante_id:selSt.id,periodo:pk,general:obsEdit.general,fortalezas:obsEdit.fortalezas,mejorar:obsEdit.mejorar}],"estudiante_id,periodo");
      // per-materia obs
      const matUpserts = Object.entries(obsEdit.materias)
        .filter(([,v])=>v!==undefined)
        .map(([materia_id,texto])=>({estudiante_id:selSt.id,materia_id,periodo:pk,texto}));
      if(matUpserts.length>0) await UPSERT("observaciones_materia",matUpserts,"estudiante_id,materia_id,periodo");
      await loadAll();
      setMObs(false);
      notify("✅ Observaciones guardadas");
    } catch(e){ notify("❌ Error: "+e.message,"#dc2626"); }
    finally{ setSaving(false); }
  }

  // ── COMUNICACIONES ────────────────────────────────────────
  async function sendComment() {
    if(!newCom.texto.trim()){notify("⚠️ Escribe un mensaje","#F59E0B");return;}
    if(newCom.tipo==="individual"&&!newCom.estudiante_id){notify("⚠️ Selecciona un estudiante","#F59E0B");return;}
    setSaving(true);
    try {
      const st = estudiantes.find(s=>s.id===newCom.estudiante_id);
      await POST("comunicaciones",{
        tipo:newCom.tipo,
        estudiante_id:newCom.tipo==="individual"?newCom.estudiante_id:null,
        grado:newCom.tipo==="grupal"?newCom.grado:st?.grado,
        area:newCom.area, texto:newCom.texto, autor:"Directora",
      });
      await loadAll();
      setNewCom({tipo:"individual",area:"General",texto:"",grado:"3A",estudiante_id:""});
      setMComent(false);
      notify("✅ Comunicado enviado y guardado");
    } catch(e){ notify("❌ Error: "+e.message,"#dc2626"); }
    finally{ setSaving(false); }
  }
  async function markRead(id) {
    try { await PATCH("comunicaciones",`id=eq.${id}`,{leido:true}); await loadAll(); } catch{}
  }
  async function markAllRead() {
    try { await PATCH("comunicaciones","leido=eq.false",{leido:true}); await loadAll(); notify("✅ Todos marcados como leídos"); } catch{}
  }

  // ── OPEN BOLETIN ──────────────────────────────────────────
  function openBoletin(student, periodIdx) {
    const pn    = notasMap[student.id]?.[periodIdx+1]||{};
    // Build notasMap for this period keyed by materia_id
    const nMap  = {};
    actMats.forEach(m=>{ nMap[m.id]=pn[m.id]??null; });
    const obsD  = obsMap[student.id]?.[periodIdx+1]||{};
    const matObs= obsMateriaMap[student.id]?.[periodIdx+1]||{};
    setBoletinV({ student, notasMap:nMap, obsData:{...obsD,materias:matObs}, period:periodIdx });
    setMBoletin(null);
  }

  if(portal) {
    const pNP={};
    [1,2,3,4].forEach(p=>{ pNP[p]=notasMap[portal.id]?.[p]||{}; });
    return <ParentPortal student={portal} notasPorPeriodo={pNP} obsTotal={obsMap[portal.id]||{}} materias={materias} comunicaciones={comunicaciones} onBack={()=>setPortal(null)}/>;
  }

                        }} style={{background:"#7C3AED",color:"#fff",border:"none",borderRadius:8,padding:"8px 0",fontSize:12,fontWeight:600,cursor:"pointer"}}>📋 Copiar</button>
                        <button className="xb" onClick={()=>setMBoletin(s)} style={{background:"#D4A017",color:"#fff",border:"none",borderRadius:8,padding:"8px 0",fontSize:12,fontWeight:600,cursor:"pointer",gridColumn:"1/-1"}}>📄 Imprimir Boletín {PERIODOS[period]}</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          </>
        )}
      </main>

      {/* ════════════════════════════════════════
          MODALS
      ════════════════════════════════════════ */}

      {/* NOTAS */}
      {mNota&&selSt&&(
        <Overlay onClose={()=>{setMNota(false);setNoteEd({});}}>
          <MHead title="✏️ Editar Notas" onClose={()=>{setMNota(false);setNoteEd({});}}/>
          <p style={{fontSize:13,color:"#6b7280",marginBottom:18}}>{selSt.nombre} · Grado {selSt.grado} · {PERIODOS[period]}</p>
          <div style={{display:"grid",gap:9,marginBottom:20}}>
            {actMats.map(m=>{
              const cur = noteEd[m.id]!=null?noteEd[m.id]:getNotasPeriodo(selSt.id,pk)[m.id]??null;
              return (
                <div key={m.id} style={{display:"flex",alignItems:"center",gap:11}}>
                  <span style={{fontSize:17,width:24,textAlign:"center",flexShrink:0}}>{m.icono}</span>
                  <label style={{flex:1,fontSize:13,fontWeight:500}}>{m.nombre}</label>
                  <input type="number" min="0" max="10" step="0.1" placeholder="0.0"
                    value={noteEd[m.id]!==undefined?noteEd[m.id]:getNotasPeriodo(selSt.id,pk)[m.id]??""}
                    onChange={e=>setNoteEd(n=>({...n,[m.id]:e.target.value===""?undefined:parseFloat(e.target.value)}))}
                    style={{width:68,padding:"7px 9px",borderRadius:8,border:"2px solid "+nClr(cur),fontSize:15,textAlign:"center",color:nClr(cur),fontWeight:700}}/>
                  <span style={{background:nBg(cur),color:nClr(cur),fontSize:10,padding:"3px 8px",borderRadius:8,fontWeight:600,minWidth:78,textAlign:"center"}}>{lbl(cur)}</span>
                </div>
              );
            })}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:9}}>
            <button onClick={()=>{setMNota(false);setNoteEd({});}} style={{padding:"11px",border:"1px solid #e5e7eb",borderRadius:10,background:"#fff",cursor:"pointer",color:"#6b7280"}}>Cancelar</button>
            <PBtn onClick={saveNotes} disabled={saving}>{saving?"Guardando...":"💾 Guardar en Supabase"}</PBtn>
          </div>
        </Overlay>
      )}

      {/* OBSERVACIONES */}
      {mObs&&selSt&&(
        <Overlay onClose={()=>setMObs(false)} wide>
          <MHead title={"📝 Observaciones · "+selSt.nombre+" · "+PERIODOS[period]} onClose={()=>setMObs(false)}/>
          <p style={{fontSize:13,color:"#6b7280",marginBottom:18}}>Se guardarán en Supabase y aparecerán en el boletín impreso.</p>
          <div style={{marginBottom:16}}>
            <Lbl c="💬 Observación general del período"/>
            <textarea value={obsEdit.general} onChange={e=>setObsEdit(o=>({...o,general:e.target.value}))} placeholder="Ej: Durante este período el/la estudiante demostró avances significativos..." style={{width:"100%",minHeight:80,padding:"10px 13px",borderRadius:10,border:"1px solid #e5e7eb",fontSize:13,lineHeight:1.5,resize:"vertical",fontFamily:"sans-serif"}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
            <div>
              <Lbl c="⭐ Fortalezas"/>
              <textarea value={obsEdit.fortalezas} onChange={e=>setObsEdit(o=>({...o,fortalezas:e.target.value}))} placeholder="Participación, liderazgo, responsabilidad..." style={{width:"100%",minHeight:90,padding:"10px 13px",borderRadius:10,border:"1px solid #a7f3d0",fontSize:12,lineHeight:1.5,resize:"vertical",fontFamily:"sans-serif",background:"#f0fdf4"}}/>
            </div>
            <div>
              <Lbl c="📈 Aspectos a mejorar"/>
              <textarea value={obsEdit.mejorar} onChange={e=>setObsEdit(o=>({...o,mejorar:e.target.value}))} placeholder="Puntualidad en entregas, atención en clase..." style={{width:"100%",minHeight:90,padding:"10px 13px",borderRadius:10,border:"1px solid #fed7aa",fontSize:12,lineHeight:1.5,resize:"vertical",fontFamily:"sans-serif",background:"#fff7ed"}}/>
            </div>
          </div>
          <div style={{marginBottom:22}}>
            <Lbl c="📚 Observación por materia"/>
            <div style={{display:"grid",gap:10}}>
              {actMats.map(m=>(
                <div key={m.id} style={{display:"flex",alignItems:"flex-start",gap:10}}>
                  <div style={{width:36,height:36,borderRadius:9,flexShrink:0,background:m.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,marginTop:1}}>{m.icono}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:600,color:"#374151",marginBottom:4}}>{m.nombre}</div>
                    <textarea value={(obsEdit.materias||{})[m.id]||""} onChange={e=>setObsEdit(o=>({...o,materias:{...(o.materias||{}),[m.id]:e.target.value}}))} placeholder={"Observación para "+m.nombre+"..."} rows={2} style={{width:"100%",padding:"8px 11px",borderRadius:8,border:"1px solid #e5e7eb",fontSize:12,lineHeight:1.4,resize:"vertical",fontFamily:"sans-serif"}}/>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:9}}>
            <button onClick={()=>setMObs(false)} style={{padding:"11px",border:"1px solid #e5e7eb",borderRadius:10,background:"#fff",cursor:"pointer",color:"#6b7280"}}>Cancelar</button>
            <PBtn onClick={saveObs} disabled={saving}>{saving?"Guardando...":"💾 Guardar Observaciones"}</PBtn>
          </div>
        </Overlay>
      )}

      {/* COMENTARIO */}
      {mComent&&(
        <Overlay onClose={()=>setMComent(false)}>
          <MHead title={newCom.tipo==="grupal"?"👥 Comunicado Grupal":"💬 Mensaje Individual"} onClose={()=>setMComent(false)}/>
          <div style={{marginBottom:14}}>
            <Lbl c="Tipo de mensaje"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {["individual","grupal"].map(t=>(
                <button key={t} onClick={()=>setNewCom(c=>({...c,tipo:t}))} style={{padding:"10px",border:"2px solid "+(newCom.tipo===t?"#1B4332":"#e5e7eb"),borderRadius:10,background:newCom.tipo===t?"#1B4332":"#fff",color:newCom.tipo===t?"#fff":"#6b7280",cursor:"pointer",fontSize:13,fontWeight:700}}>
                  {t==="individual"?"👤 Individual":"👥 Grupal"}
                </button>
              ))}
            </div>
          </div>
          {newCom.tipo==="individual"?(
            <div style={{marginBottom:14}}>
              <Lbl c="Estudiante"/>
              <select value={newCom.estudiante_id} onChange={e=>setNewCom(c=>({...c,estudiante_id:e.target.value}))} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #e5e7eb",fontSize:13,background:"#fff"}}>
                <option value="">Seleccionar...</option>
                {estudiantes.map(s=><option key={s.id} value={s.id}>{s.nombre} · Grado {s.grado}</option>)}
              </select>
            </div>
          ):(
            <div style={{marginBottom:14}}>
              <Lbl c="Grado destinatario"/>
              <select value={newCom.grado} onChange={e=>setNewCom(c=>({...c,grado:e.target.value}))} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #e5e7eb",fontSize:13,background:"#fff"}}>
                {GRADES.map(g=><option key={g}>{g}</option>)}
              </select>
            </div>
          )}
          <div style={{marginBottom:14}}>
            <Lbl c="Área / Materia"/>
            <select value={newCom.area} onChange={e=>setNewCom(c=>({...c,area:e.target.value}))} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #e5e7eb",fontSize:13,background:"#fff"}}>
              <option value="General">General</option>
              {materias.map(m=><option key={m.id} value={m.nombre}>{m.icono} {m.nombre}</option>)}
            </select>
          </div>
          <div style={{marginBottom:20}}>
            <Lbl c="Mensaje para los padres"/>
            <textarea value={newCom.texto} onChange={e=>setNewCom(c=>({...c,texto:e.target.value}))} placeholder="Escriba el mensaje que verán los padres..." style={{width:"100%",minHeight:100,padding:"11px 13px",borderRadius:10,border:"1px solid #e5e7eb",fontSize:13,lineHeight:1.5,resize:"vertical"}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:9}}>
            <button onClick={()=>setMComent(false)} style={{padding:"11px",border:"1px solid #e5e7eb",borderRadius:10,background:"#fff",cursor:"pointer",color:"#6b7280"}}>Cancelar</button>
            <PBtn onClick={sendComment} disabled={saving}>{saving?"Enviando...":"📤 Enviar y Guardar"}</PBtn>
          </div>
        </Overlay>
      )}

      {/* NUEVO ESTUDIANTE */}
      {mStudent&&(
        <Overlay onClose={()=>setMStudent(false)}>
          <MHead title="👨‍🎓 Nuevo Estudiante" onClose={()=>setMStudent(false)}/>
          {[{k:"nombre",l:"Nombre completo *",p:"Ej: Ana María López"},{k:"parent_nombre",l:"Nombre del acudiente",p:"Ej: María López"},{k:"parent_telefono",l:"Teléfono",p:"Ej: 3001234567"},{k:"parent_email",l:"Correo",p:"Ej: acudiente@email.com"}].map(f=>(
            <div key={f.k} style={{marginBottom:13}}>
              <Lbl c={f.l}/>
              <Inp value={newSt[f.k]} onChange={e=>setNewSt(s=>({...s,[f.k]:e.target.value}))} placeholder={f.p}/>
            </div>
          ))}
          <div style={{marginBottom:20}}>
            <Lbl c="Grado"/>
            <select value={newSt.grado} onChange={e=>setNewSt(s=>({...s,grado:e.target.value}))} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #e5e7eb",fontSize:13,background:"#fff"}}>
              {GRADES.map(g=><option key={g}>{g}</option>)}
            </select>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:9}}>
            <button onClick={()=>setMStudent(false)} style={{padding:"11px",border:"1px solid #e5e7eb",borderRadius:10,background:"#fff",cursor:"pointer",color:"#6b7280"}}>Cancelar</button>
            <PBtn onClick={addStudent} disabled={saving}>{saving?"Guardando...":"✅ Registrar Estudiante"}</PBtn>
          </div>
        </Overlay>
      )}

      {/* MATERIA */}
      {mMateria&&(
        <Overlay onClose={()=>setMMateria(null)} wide>
          <MHead title={mMateria==="new"?"🗂️ Nueva Materia":"✏️ Editar Materia"} onClose={()=>setMMateria(null)}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
            <div><Lbl c="Nombre *"/><Inp value={fMat.nombre} onChange={e=>setFMat(f=>({...f,nombre:e.target.value}))} placeholder="Ej: Química, Música..."/></div>
            <div><Lbl c="Docente responsable"/><Inp value={fMat.docente} onChange={e=>setFMat(f=>({...f,docente:e.target.value}))} placeholder="Ej: Prof. Martínez"/></div>
          </div>
          <div style={{marginBottom:14}}>
            <Lbl c="Ícono"/>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {ICONOS.map(ic=>(
                <button key={ic} onClick={()=>setFMat(f=>({...f,icono:ic}))} style={{width:40,height:40,borderRadius:9,cursor:"pointer",fontSize:19,border:"2px solid "+(fMat.icono===ic?"#1B4332":"#e5e7eb"),background:fMat.icono===ic?"#d1fae5":"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>{ic}</button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:22}}>
            <Lbl c="Color"/>
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:9}}>
              {COLORES.map(col=>(
                <button key={col} onClick={()=>setFMat(f=>({...f,color:col}))} style={{width:30,height:30,borderRadius:"50%",background:col,cursor:"pointer",border:"3px solid "+(fMat.color===col?"#1B4332":"transparent"),boxShadow:fMat.color===col?"0 0 0 2px #fff,0 0 0 4px #1B4332":"none"}}/>
              ))}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <input type="color" value={fMat.color} onChange={e=>setFMat(f=>({...f,color:e.target.value}))} style={{width:38,height:38,borderRadius:8,border:"1px solid #e5e7eb",cursor:"pointer",padding:2}}/>
              <span style={{fontSize:12,color:"#6b7280"}}>O elige un color personalizado</span>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:9}}>
            <button onClick={()=>setMMateria(null)} style={{padding:"11px",border:"1px solid #e5e7eb",borderRadius:10,background:"#fff",cursor:"pointer",color:"#6b7280"}}>Cancelar</button>
            <PBtn onClick={saveMat} disabled={saving}>{saving?"Guardando...":(mMateria==="new"?"✅ Agregar Materia":"💾 Guardar Cambios")}</PBtn>
          </div>
        </Overlay>
      )}

      {/* CONFIRMAR ELIMINAR MATERIA */}
      {mDelMat&&(
        <Overlay onClose={()=>setMDelMat(null)}>
          <div style={{textAlign:"center",padding:"8px 0"}}>
            <div style={{fontSize:46,marginBottom:14}}>🗑️</div>
            <h3 style={{fontFamily:"Georgia,serif",fontSize:19,color:"#1B4332",marginBottom:9}}>¿Eliminar materia?</h3>
            <p style={{fontSize:13,color:"#6b7280",lineHeight:1.5,marginBottom:6}}>Eliminarás <strong>"{mDelMat.nombre}"</strong> y todas sus notas registradas en Supabase.</p>
            <p style={{fontSize:12,color:"#DC2626",marginBottom:22}}>⚠️ Esta acción no se puede deshacer.</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
              <button onClick={()=>setMDelMat(null)} style={{padding:"11px",border:"1px solid #e5e7eb",borderRadius:10,background:"#fff",cursor:"pointer",color:"#6b7280"}}>Cancelar</button>
              <PBtn onClick={deleteMat} color="#DC2626" disabled={saving}>{saving?"Eliminando...":"🗑️ Sí, eliminar"}</PBtn>
            </div>
          </div>
        </Overlay>
      )}

      {/* NUEVA ACTIVIDAD */}
      {mAct&&(
        <Overlay onClose={()=>setMAct(false)} wide>
          <MHead title="📅 Nueva Actividad" onClose={()=>setMAct(false)}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            <div>
              <Lbl c="Estudiante *"/>
              <select value={newAct.estudiante_id} onChange={e=>setNewAct(a=>({...a,estudiante_id:e.target.value}))}
                style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #e5e7eb",fontSize:13,background:"#fff"}}>
                <option value="">Seleccionar...</option>
                {estudiantes.map(s=><option key={s.id} value={s.id}>{s.nombre} · {s.grado}</option>)}
              </select>
            </div>
            <div>
              <Lbl c="Materia *"/>
              <select value={newAct.materia_id} onChange={e=>setNewAct(a=>({...a,materia_id:e.target.value}))}
                style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #e5e7eb",fontSize:13,background:"#fff"}}>
                <option value="">Seleccionar...</option>
                {actMats.map(m=><option key={m.id} value={m.id}>{m.icono} {m.nombre}</option>)}
              </select>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            <div>
              <Lbl c="Tipo de actividad *"/>
              <select value={newAct.tipo} onChange={e=>setNewAct(a=>({...a,tipo:e.target.value}))}
                style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #e5e7eb",fontSize:13,background:"#fff"}}>
                {Object.entries(ACT_TIPOS).map(([t,{icon,peso}])=>(
                  <option key={t} value={t}>{icon} {t} ({Math.round(peso*100)}%)</option>
                ))}
              </select>
            </div>
            <div>
              <Lbl c="Período"/>
              <select value={newAct.periodo} onChange={e=>setNewAct(a=>({...a,periodo:parseInt(e.target.value)}))}
                style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #e5e7eb",fontSize:13,background:"#fff"}}>
                {PERIODOS.map((p,i)=><option key={i} value={i+1}>{p}</option>)}
              </select>
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <Lbl c="Título de la actividad *"/>
            <Inp value={newAct.titulo} onChange={e=>setNewAct(a=>({...a,titulo:e.target.value}))} placeholder="Ej: Taller de fracciones, Lectura comprensiva..."/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            <div>
              <Lbl c="Nota (0 – 10) *"/>
              <input type="number" min="0" max="10" step="0.1" value={newAct.nota}
                onChange={e=>setNewAct(a=>({...a,nota:e.target.value}))} placeholder="0.0"
                style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`2px solid ${nClr(parseFloat(newAct.nota)||null)}`,fontSize:15,fontFamily:"sans-serif",fontWeight:700,color:nClr(parseFloat(newAct.nota)||null),textAlign:"center"}}/>
            </div>
            <div>
              <Lbl c="Fecha"/>
              <input type="date" value={newAct.fecha} onChange={e=>setNewAct(a=>({...a,fecha:e.target.value}))}
                style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #e5e7eb",fontSize:13,fontFamily:"sans-serif"}}/>
            </div>
          </div>
          <div style={{marginBottom:22}}>
            <Lbl c="Observación (opcional)"/>
            <textarea value={newAct.observacion} onChange={e=>setNewAct(a=>({...a,observacion:e.target.value}))}
              placeholder="Ej: Entregó tarde, excelente presentación..."
              rows={2} style={{width:"100%",padding:"10px 13px",borderRadius:10,border:"1px solid #e5e7eb",fontSize:13,resize:"vertical",fontFamily:"sans-serif"}}/>
          </div>
          {/* preview ponderado */}
          {newAct.nota!==""&&(
            <div style={{background:"#f0fff4",border:"1px solid #a7f3d0",borderRadius:10,padding:"11px 14px",marginBottom:16,fontSize:12,color:"#065f46"}}>
              <strong>{ACT_TIPOS[newAct.tipo]?.icon} {newAct.tipo}</strong> pesa el <strong>{Math.round((ACT_TIPOS[newAct.tipo]?.peso||0)*100)}%</strong> del promedio final del período.
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:9}}>
            <button onClick={()=>setMAct(false)} style={{padding:"11px",border:"1px solid #e5e7eb",borderRadius:10,background:"#fff",cursor:"pointer",color:"#6b7280"}}>Cancelar</button>
            <PBtn onClick={saveAct} disabled={saving}>{saving?"Guardando...":"💾 Guardar Actividad"}</PBtn>
          </div>
        </Overlay>
      )}

      {/* CONFIRMAR ELIMINAR ACTIVIDAD */}
      {mDelAct&&(
        <Overlay onClose={()=>setMDelAct(null)}>
          <div style={{textAlign:"center",padding:"8px 0"}}>
            <div style={{fontSize:40,marginBottom:12}}>🗑️</div>
            <h3 style={{fontFamily:"Georgia,serif",fontSize:18,color:"#1B4332",marginBottom:8}}>¿Eliminar actividad?</h3>
            <p style={{fontSize:13,color:"#6b7280",marginBottom:6}}><strong>"{mDelAct.titulo}"</strong></p>
            <p style={{fontSize:11,color:"#9ca3af",marginBottom:20}}>Esta acción no se puede deshacer.</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
              <button onClick={()=>setMDelAct(null)} style={{padding:"11px",border:"1px solid #e5e7eb",borderRadius:10,background:"#fff",cursor:"pointer",color:"#6b7280"}}>Cancelar</button>
              <PBtn onClick={deleteAct} color="#DC2626" disabled={saving}>{saving?"Eliminando...":"🗑️ Eliminar"}</PBtn>
            </div>
          </div>
        </Overlay>
      )}

      {/* ELEGIR PERÍODO BOLETÍN */}
      {mBoletin&&(
        <Overlay onClose={()=>setMBoletin(null)}>
          <MHead title="📄 Generar Boletín" onClose={()=>setMBoletin(null)}/>
          <p style={{fontSize:13,color:"#6b7280",marginBottom:18}}>Selecciona el período para <strong>{mBoletin.nombre}</strong>.</p>
          <div style={{display:"grid",gap:8,marginBottom:20}}>
            {PERIODOS.map((p,i)=>{
              const pn   = getNotasPeriodo(mBoletin.id,i+1);
              const hasN = actMats.some(m=>pn[m.id]!=null);
              return (
                <button key={i} onClick={()=>{ if(!hasN)return; openBoletin(mBoletin,i); }} disabled={!hasN}
                  style={{padding:"12px 16px",border:"1px solid "+(hasN?"#1B4332":"#e5e7eb"),borderRadius:10,background:hasN?"#f0fff4":"#f9fafb",cursor:hasN?"pointer":"not-allowed",fontSize:13,fontWeight:600,color:hasN?"#1B4332":"#9ca3af",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  {p}
                  {hasN?<span style={{color:"#52B788"}}>Prom: {fmt(avg(actMats.map(m=>pn[m.id])))} →</span>:<span style={{fontSize:11,color:"#9ca3af"}}>Sin notas</span>}
                </button>
              );
            })}
          </div>
          <button onClick={()=>setMBoletin(null)} style={{width:"100%",padding:"11px",border:"1px solid #e5e7eb",borderRadius:10,background:"#fff",cursor:"pointer",color:"#6b7280"}}>Cerrar</button>
        </Overlay>
      )}

      {/* LINK PADRE */}
      {mLink&&(
        <Overlay onClose={()=>setMLink(null)}>
          <MHead title="🔗 Portal para Padres" onClose={()=>setMLink(null)}/>
          <p style={{fontSize:13,color:"#6b7280",marginBottom:13}}>Link para <strong>{mLink.parent_nombre||"el acudiente"}</strong> de <strong>{mLink.nombre}</strong>:</p>
          <div style={{background:"#f0fff4",border:"1px solid #a7f3d0",borderRadius:9,padding:"12px 15px",fontSize:12,color:"#065f46",wordBreak:"break-all",marginBottom:18}}>
            🔗 mpt.edu.co/padre/{mLink.parent_token}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:11}}>
            <PBtn color="#7C3AED" onClick={()=>{navigator.clipboard?.writeText(`mpt.edu.co/padre/${mLink.parent_token}`).then(()=>notify("✅ Link copiado")).catch(()=>notify("✅ Link listo"));}}>📋 Copiar link</PBtn>
            <PBtn onClick={()=>setPortal(mLink)}>👁️ Ver portal</PBtn>
          </div>
          {mLink.parent_telefono&&<div style={{textAlign:"center",fontSize:11,color:"#9ca3af"}}>📱 {mLink.parent_telefono} · {mLink.parent_email}</div>}
          <button onClick={()=>setMLink(null)} style={{width:"100%",marginTop:13,padding:"11px",border:"1px solid #e5e7eb",borderRadius:10,background:"#fff",cursor:"pointer",color:"#6b7280"}}>Cerrar</button>
        </Overlay>
      )}

      {/* BOLETÍN PREVIEW */}
      {boletinV&&(
        <Boletin
          student={boletinV.student}
          notasMap={boletinV.notasMap}
          obsData={boletinV.obsData}
          period={boletinV.period}
          materias={materias}
          logoUrl={logoUrl}
          onClose={()=>setBoletinV(null)}
        />
      )}
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
